<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Vertical grid lines -->
  <line x1="22" y1="12" x2="22" y2="52" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="36" y1="12" x2="36" y2="52" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="50" y1="12" x2="50" y2="52" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Row 1 bar -->
  <rect x="12" y="14" width="24" height="7" rx="3" fill="white" fill-opacity="0.95"/>
  <!-- Row 2 bar -->
  <rect x="22" y="25" width="20" height="7" rx="3" fill="white" fill-opacity="0.75"/>
  <!-- Row 3 bar -->
  <rect x="12" y="36" width="14" height="7" rx="3" fill="white" fill-opacity="0.55"/>
  <!-- Row 4 bar -->
  <rect x="30" y="36" width="22" height="7" rx="3" fill="#93c5fd" fill-opacity="0.95"/>
  <!-- Bottom axis line -->
  <line x1="10" y1="50" x2="54" y2="50" stroke="white" stroke-opacity="0.4" stroke-width="1.5" stroke-linecap="round"/>
</svg>
